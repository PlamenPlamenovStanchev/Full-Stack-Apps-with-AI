<div class="tab-content clients">
    <div class="tab-header">
        <h1>Clients</h1>
        <button id="add-client-btn" class="btn btn-primary">+ Add Client</button>
    </div>
    
    <!-- Clients Table -->
    <div class="table-container">
        <table class="data-table" id="clients-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Tax ID</th>
                    <th>Address</th>
                    <th>Manager</th>
                    <th>IBAN</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="clients-tbody">
                <!-- Client rows will be inserted here -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Modal -->
    <div id="client-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Client</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="client-form">
                <div class="form-group">
                    <label for="client-name">Company Name</label>
                    <input type="text" id="client-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="client-taxId">Tax ID</label>
                    <input type="text" id="client-taxId" name="taxId" required>
                </div>
                <div class="form-group">
                    <label for="client-address">Address</label>
                    <input type="text" id="client-address" name="address" required>
                </div>
                <div class="form-group">
                    <label for="client-manager">Manager</label>
                    <input type="text" id="client-manager" name="manager" required>
                </div>
                <div class="form-group">
                    <label for="client-iban">IBAN</label>
                    <input type="text" id="client-iban" name="iban" required>
                </div>
                <input type="hidden" id="client-id" name="id">
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-success">Save</button>
                    <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="modal-close" id="delete-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete client "<span id="delete-client-name"></span>"?</p>
                <p class="warning-text">This action cannot be undone.</p>
            </div>
            <div class="modal-buttons">
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
                <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
</div>

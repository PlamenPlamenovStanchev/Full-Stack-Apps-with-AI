<div class="tab-content products">
    <div class="tab-header">
        <h1>Products</h1>
        <button id="add-product-btn" class="btn btn-primary">+ Add Product</button>
    </div>
    
    <!-- Products Table -->
    <div class="table-container">
        <table class="data-table" id="products-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Currency</th>
                    <th>Unit</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-tbody">
                <!-- Product rows will be inserted here -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Modal -->
    <div id="product-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Product</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="product-form">
                <div class="form-group">
                    <label for="product-name">Product Name</label>
                    <input type="text" id="product-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="product-price">Price</label>
                    <input type="number" id="product-price" name="price" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="product-currency">Currency</label>
                    <select id="product-currency" name="currency" required>
                        <option value="BGN">BGN</option>
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="product-unit">Unit</label>
                    <input type="text" id="product-unit" name="unit" placeholder="e.g., hour, piece, month" required>
                </div>
                <input type="hidden" id="product-id" name="id">
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-success">Save</button>
                    <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="modal-close" id="delete-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete product "<span id="delete-product-name"></span>"?</p>
                <p class="warning-text">This action cannot be undone.</p>
            </div>
            <div class="modal-buttons">
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
                <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
</div>
